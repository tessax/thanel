<!DOCTYPE html>
<html>
<head>
    <title>THANEL - AI Sapling Verification</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>THANEL - AI Sapling Verification System</header>

<div class="container">

    <!-- LOGIN PAGE -->
    <div id="loginPage" class="card">
        <h3>Login</h3>

        <select id="role">
            <option value="uc">UC Login</option>
            <option value="rc">RC Login</option>
        </select>

        <input type="text" placeholder="Enter ID">
        <input type="password" placeholder="Enter Password">

        <button onclick="login()">Login</button>
    </div>

    <!-- UC DASHBOARD -->
    <div id="ucDashboard" class="hidden">
        <div class="card">
            <h3>UC Dashboard - Upload Plantation Image</h3>

            <input type="file" id="imageUpload">
            <input type="text" placeholder="Name">
            <input type="date" id="dob">
            <input type="text" placeholder="NSS Unit Number">
            <input type="text" placeholder="College Name">
            <input type="text" placeholder="Plant Name">
<button type="button" onclick="submitEntry()">Submit</button>
        </div>
    </div>

    <!-- RC DASHBOARD -->
    <div id="rcDashboard" class="hidden">
        <h3>RC Dashboard - Uploaded Entries</h3>

        <table>
            <tr>
                <th>Name</th>
                <th>College</th>
                <th>Verify</th>
                <th>Approve</th>
            </tr>
            <tr>
                <td>Sample User</td>
                <td>ABC College</td>
                <td><button onclick="verify()">Verify</button></td>
                <td><button onclick="approve()">Approve</button></td>
            </tr>
        </table>
    </div>

    <!-- POSTER PAGE -->
    <div id="posterPage" class="hidden">
        <div class="poster">
            <h2>Plantation Certificate</h2>
            <p>Name: Sample User</p>
            <p>College: ABC College</p>
            <p>NSS Unit: 123</p>
            <p>Plant: Neem</p>
            <p>Date: 17-02-2026</p>

            <button onclick="downloadPoster()">Download Poster</button>
        </div>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
